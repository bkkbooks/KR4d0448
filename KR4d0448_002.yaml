body:
  text: 山村遺集跋仇山村先生有金淵集久己散佚世所傳興觀集山村遺稿皆從手書真迹抄得非完本也先生為咸淳遺老及見宋先輩典型其詩清夷雅正一倡三歎若張承旨仲舉張外史伯雨皆出其門以詩名世素與同里湛囦白先生齊名謂之仇白豫向喜誦先生詩留意披訪從珊瑚木難清河書畫舫成化杭州府志嘉興府志補上天竺寺志絶妙好詞花草粹編諸書中復得詩詞題跋如千首分各體編排成帙刻於杭郡惜湛囦全集無從寓目僅見於顧氏元詩選中不得與先生合璧為歉事云乾隆庚申春仲古歙項夢昶謹跋
