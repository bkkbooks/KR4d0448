body:
  text: 山村遺集别集類四元提要臣等謹案山村遺集一卷元仇逺撰逺所撰金淵集皆官溧陽日作故取投金瀨事以為名所載皆溧陽之詩而他作不預焉其他作為方鳳牟巘戴表元等所序者僅序見諸家集中而詩則久佚世所傳興觀集山村遺稿皆後人以墨迹裒刻非其完本此本為歙縣項夢昶所編後有夢昶跋稱留意搜訪從珊瑚木難清河書畫舫成化杭州府志嘉興府志補上天竺寺志絶妙好詞花草稡編諸書中復得詩詞題跋如千首編排成帙雖其時永樂大典猶庋藏清祕外間不得而窺金淵集所載夢昶皆不及録不足以盡逺之著作然此集之詩皆不作於溧陽不可併入金淵集內故仍存其書各著于録以不沒逺之佚篇焉乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀山村仇君過豫説詩余觀其年甚茂才識甚髙處紛華聲利之場而冷淡生活之嗜混沌盆盎中見此古罍洗令人心醉及披華帙標格如其人蓋得乾坤清氣之全者也余謂作詩當知所主久則自成一家唐人之詩以詩為文故寄興深裁語婉本朝之詩以文為詩故氣渾雄事精實四靈而後以詩為詩故月露之清浮煙雲之鮮麗今君留情雅道滌筆冰甌其孰之從仇君曰近體吾主於唐古體吾主於選闕融化事往往於融暢圓美中忽而淒楚藴結有離騷三致意之遺韻然後知向之所以為仁父者窮而故在也今夫水雖萬折必東焉鳥獸大者喪其羣過鄉翔回焉鳴號蹢躑焉小者至於燕雀猶有啁噍之鳴焉由人心生也使遭變而不悲黍離居嫠而不念儀髠望白雲而不思親聞山陽笛而不懷故是無人心矣尚復有詩哉此余於仁父之詩獨證其不為窮所移又明年復相見乃序而歸之人當有因余言而深知仁父之心者世之人不有知其心則仁父自知之余知之後世必有知之者矣浦江方鳳韶父撰觀水必於海觀其會也杭社其詩之會乎非精能之至未易據其會而擅其名山村仇君仁近嘗有辛丑出西嶽詩適從何來而欲效淵明耶自此亦皆以甲子書似此例者甚衆而世獨喜言淵明蓋淵明書甲子凡十二時自序其平生出處本末略備庚子鎮東參軍使者己有靜想田園好人間良可辭之語辛丑還江陵中途欲投冠歸故墟以申前志乙已建安參軍使者則田園日夢想其意愈迫矣至秋去為彭澤令八十餘日遂賦歸去來義熙元年也其使事往來及留上京還舊居皆在此六年中自此不復出乙已至丙辰又十二年庚戌西田曰遙遙沮溺心丙辰下潠田舍曰遙謝荷蓧翁則往而不返致命遂志無可復言論淵明者要當以是為斷仇君自號山村不願富貴而志在田園正如已酉九日庚戌西田丙辰下潠田舍穫耳是真知慕淵明者可尚矣陽陵牟巘景定咸淳之間余初客杭見能詩人不一二數不必皆杭産也時余雖學詩方從事進取每每為人所厭薄以為兹技乃天之所以畀於窮退之人使其吟謡山林以泄其無聊非涉世者所得兼余嘗隘而非之諸君子非失職安得為此不祥之言離去二十年復來事有不可言諸詩人皆盡而余恍然獨行獨止如羈禽越鄉而無與羣如馬行過其故櫪徘徊而悲鳴也嗚呼疇昔之嘆豈不以此哉然猶未敢自斷何世無人何人無心特余交際先後疏數之間不足以得之久之屠君存博白君廷玉二君者皆亹亹志於古人皆不棄余而肯與之交私心自喜久之因二君得仇仁近也遂贈余鋟成一巨編叩其藏未鋟者尚什百於此余驚其多而服其善羡其敏而敬其密自是寓客中抑鬱不自暢不得與諸君晤語則取其所編張之案端行坐諷之以為快仁近又方力學期樹立以為千百年後世計視余區區相知於耳目間似不足為既竊自喜兹編之不絶於世而余猶及見之耳仁近詩余不敢託於知言就杭人求之比其盛時又過之無不及也余年視仁近不甚相絶而氣盡衰業不早就進退皆無足據幸君之相親庶幾諸君愈益見厚時時得新聞以洗舊蔽不敢望有名譽或藉以一樂稍稍捐去晚暮孤貧之憂即君賜大矣若君之所願君自得之余無以進君也剡源戴表元序
