body:
  text: 山村遺集元仇逺撰古體詩采薇吟采薇采薇西山之西薇死復生不生夷齊陟彼西山我心悲兮步出上東門步出上東門肺肺東門栁彼美窈窕娘惜為蕩子婦中堂裁衣裳刀尺常在手之子未歸家何以奉箕帚為君長相思躑躅嵗云久思君頭易白惜無百年夀誰能學仙人辟榖但飲酒素月出東嶺素月出東嶺照我白玉牀牀上何所有纍纍書一囊詰曲科斗文讀之不成章君車自翺翔駕景朝紫皇蒼苔滿石匣瑶書空祕藏仙人百尺臺吹竹引鳳凰鳳兮來不來虛此明月光雜畫東風吹寒晴春事歸花栁既有杖頭錢何苦不飲酒嗟嗟王孫去芳草入户牖惟有南山髙曉霧亦白首去年秉燭遊知有今日否所以晉名流酒杯不去手窗下黃昏忽上雲西窗竟無月燭花自盈枝可玩不可折天風吹鐘聲急急吹燭滅可惜窗下書少讀三四葉紀夢安翔紫雲軿遊盼璚仙家斜陽射巖谷眩目皆丹砂娃鬟挾鸞尾倦掃菖蒲花相隨曲腸結錐可解眉皺尉可伸獨不禁子規日日啼春心春風醉行客門外芳草深芳草已無路行行又何處東園花栁多賤妾不復顧秋胡夫不夫買臣婦不婦人心匪金石悔不隨郎去題髙房山寫山村圖卷并序大德初元九月十九日清河張淵甫二一作式車會髙彥敬御史於泉月精舍酒半為余作山村圖頃刻而成元氣淋漓天真爛漫脫去畫工筆墨畦町余方棲遲塵土無山可耕展玩此圖為之悵然而已我家仇山陽昔有數椽屋誤落塵市間讀書學干祿井枯竈煙絶況復問松菊如此五十年一出不可復髙侯丘壑胸知我志幽獨為寫隱居圖寒溪入空谷蒼石壓危構白雲養喬木向來仇池夢歷歷在我目何哉草堂資政爾飰不足視我舌尚存吾居有時卜春風謡春風吹柳枝栁枝拂短牆春風吹桃葉桃葉浮煙江春風薄情不可當鳴鳩乳燕相頡頏春日長春夜短雪花撲帳春不暖秋日曲秋風悲梧桐知不知渴虹挾雨吸河漢嘹嘹數雁天四垂雁急不成字逺向瀟湘飛銅盤露下夜如水宋玉新自巫山歸巴東西巴東有杜鵑杜鵑啼春花正妍巴西有杜鵑杜鵑啼血花可憐巴東巴西久為客目斷江南歸未得月明滿地山花白聽杜將軍帳下兒歌桓將軍軍城南牛將軍軍城北他軍只有八千人卒急臨洮攻未得鞾尖蹴城城未頽馬箠填河河未滿十嵗健兒下馬行兩足胡為自長短什什伍伍金人降將軍忍殺令歸鄉歸時説與汝郎長納土封汝異姓王葛雄女子舞劍歌葛家女兒十四五不向深閨學針縷遍身繡出蛟螭文赤手交持太阿舞紅羅帕兮錦纒頭口吐長安遊俠語側身捷如飛鳥輕瞋目勇如獨鶻舉雲窗霧閣豈無情終欠嬌嬈太粗武黃堂張燕燈燭光兩耳喧喧厭歌鼓人言葛氏善舞劍曾向梨園奉尊俎短衣結束當筵呈壯士增雄懦夫沮我憐健婦勝丈夫卻欲驕兵如處女安得成軍如娘子直氣端能捷秦楚只愁逢著裴將軍公孫大娘汗成雨海上圖澄江仙刻老仙指甲堅如鐵夜畫枯杉出宫闕翠深紅逺十二樓猶理霓裳舞回雪山椒覆亭小於笠石腳插船輕似葉桃花幾度春酣酣弱水何日通舟楫醉中作此狡獪事收拾乾坤入毫髮神刓鬼刻未百年不與丹青共磨滅天風頡頏飛霞珮水雲妥帖凌波襪我將就此逍遙遊髙步青霄拾明月題石民瞻畫鶴溪圖鶴溪近與練湖連一境秋水清無邊依稀淮岸瀟湘浦慣見月虹書畫船山翁幾年吳下客溪草溪花未相識筆牀茶竈老玄真肯與沙鷗分半席贈張玉田秦川公子謫仙人布袍落魄餘一身錦囊香歇玉簫斷庾郎白髮徒傷春金臺掉頭不肯住欲把釣竿東海去故鄉入夢忽歸來井邑依依鐡爐步碧池槐葉玄都桃眼空舊雨秋蕭颾顧本作颼太湖風月數萬頃扁舟乘興尋三髙西北髙樓一杯酒與子長歌折楊栁江山信美盍便留蓴菜鱸魚隨處有今體詩圓通峯頂結亭孤絶處登眺不辭勞萬木俯在下一峯如此髙山圍湖面小藤絡樹根牢揮手紅塵表天風欲跨鼇雪花仙人初翦水欲下復遲遲半夜忽自落東風竟不知無香黏客袖有意補春枝却憶江南栁飄綿送子時渡越蒼煙迷古道白水滿平疇落雁湘湖月孤砧粵樹秋壯心消蠟屐老淚入貂裘市飲成淒斷何人識馬周韶華韶華已如此冉冉積芳塵石潤先知雨山濃渾是春釣魚臨積水隔栁見行人應有忘歸者扁舟採白蘋和曹之才山林不可住欲隱更何之春去已多日客愁無了時斜陽依樹下明月到門遲間事誰消遣陶潛一卷詩鎮海亭海塘三十里此屋獨巍然有浪方知水無雲總是天苔痕封石柱帆影下樓船間憶童男女悠悠去幾年寄潘懷古園林搖落夜靜獨奈秋何黃葉下不止青苔掃更多回風喧地籟濃露洗天河懷楚思無極長簫按九歌石窗􅌑瓏千丈崖髙處倚蓬萊山月照得白天風吹不開渴龍棲古井病鶴下蒼苔祇有麻衣叟時時把易來為如鏡淨上人賦一片靈臺月圓明適中規誰知相對者曾悟未磨時去垢元來淨觀空了不疑水邊間獨立照見白鬚眉寄題如鏡上人房吳城久卜居歸夢只西湖花木四時有塵埃一點無看經常戒酒得句少催租盡日坐相對壁間蓮社圖錦城方天瑞玄英先生後人得白雲山居圖倣佛桐廬山中隱所錢舜舉真迹别有一種風致漫系以詩翼翼山千朵蕭蕭屋數間石崖不可度門徑幾曽關緑樹經秋在白雲終日間依稀鏡湖曲西島水回環陸君實挽詩顧本作挽陸右丞秀夫乾坤那可問至痛老臣心甘抱白日沒不知滄海深忠魂隨上下義骨肯浮沈草木長淮淚秋風起莫隂約山中友以下詩三十八首見贈盛元仁手書詩卷望極秋空無片雲前山厯厯見遙岑新鴻漸到邊城靜舊雨不來汀草深仙李有時曽入夢伯桃死後少知心如君真是忘機者海上鷗盟便可尋寄朱飲冰欲共談詩一解頤停雲望極一作空惹思依依梅花賦就廣平老楊柳門間靖節歸驛路數程征馬瘦家書千里過鴻稀思君怕倚闌干北拄笏看山竟落暉北窗北窗隱几樂吾天莫遣新愁到耳邊一帽好花供醉舞半牀涼月伴間眠故人自欲辭文叔明主何嘗棄浩然留取長安遮日手養成指甲理朱絃拜霞嶼待制伯祖墓下難尋華表與豐碑三尺墳臺山一作三四圍翁仲多年蒼珮剝子孫寒食紙錢稀瘦藤拔地長蛇走灌木維垣野鼠肥逺也久違鄉族去忍將椒酒酹斜暉髙卧人生天地一蘧廬耕鑿雖勞樂有餘因閲杜詩刪舊稿為觀羲帖學行書山公醉後猶騎馬渭叟間來只釣魚世道秋風總蕭索何如髙卧白雲居雨餘兩兩鳴鳩語畫一作畫簷雨餘芳草欲生煙甕頭酒熟常留客象外詩成頗類仙揚子有才猶執戟淵明無事合歸田地偏時事人傳少收拾琴書且醉一作畫眠元友山南山新一作村居顧本作元友山南新居桃栁參差出短牆小樓突兀看湖光出門便與青山對讀易能消白日長硯石洗來如玉潤藥苗曬得似茶香鄰僧亦有通文者常把詩來惱漫郎再賦幽居穩占南山下人迹稀疏水竹村轉巷始知猶有路傍湖更好别開門酒尊盡日嘗謀婦詩課間時略抱孫孤鶴不來髙士少暗香且伴月黃昏答胡葦杭久矣相期物外遊長風吹不斷間愁兩山翼翼青如舞霜鬢颾颾白始休蕉鹿夢回天地枕蓴鱸興到水雲舟舊藏方鏡明如月看去看來又一秋次胡葦杭韻曾識清明上已時懶能遊冶一作隨蜂蝶步芳菲梨花半落雨初過一作歇杜宇不鳴春自歸雙冡年深人祭少孤山日晚客來稀江南尚有餘寒在莫倚東風褪絮衣送王仙麓使君赴道州暫歸三山家山小為離支留征斾催行莫待秋應有矮奴騎竹馬相隨迓吏拜蘭舟舜山如畫當樓見楚水浮香繞郡流念我有親頭雪白雲龍追逐恨無由奉寄田上人竹笻輕健草鞋寬野外消磨半日間病葉已霜猶戀樹片雲欲雨又歸山燈分寺塔晴偏見水隔漁家夜不關愧我莫如霜一作沙上鷺霎時飛去便一作又飛還閻氏園池真妃已返鳳臺仙獨立池亭思愴然海嶽不傳青鳥信石房誰伴白雲眠宫桃移種難生實院籜初翻又引鞭凝碧荒涼絃管靜萍花浮滿釣魚船江上送友知爾懷親憶故州一作丘相逢沽酒且遲留夕陽有恨一作限荒荒白江水無聲泯泯流孤鳥出潮投渚尾野蘆飛雪壓船頭却愁明月中秋近不得同登庾亮樓送劉竹間歸廬陵驛路梅花漠漠寒絨衫絮帽出長安懸知客久歸心切自覺交深别語難春入西江隨馬去山留殘雪待人看青原白鷺如相問十載湖濱只釣竿道場山山行龜背路羊腸伏虎禪師古道場老木隂中安御座白雲堆裏撫僧牀勺泉清徹涵秋味尖塔孤撑界夕陽笑月亭空人影散松風和顧本作如雨動天簧何山溪轉峯回一徑平田頭白水照人清寺因何氏封山姓客把坡詩證地名蘿月長隨行道影杉風猶帶讀書聲雲津橋下潺湲急僧濯袈裟客濯纓新安郡圃亭榭凌空眼界寬得間來處獨憑闌春浮練水蒸城潤雪被黃山入座寒古樹巢空羣鳥散荒池沙滿碎薸乾白雲在望歸期定不見清油護牡丹拜孫花翁墓下水仙分地葬詩人一片荒山野火焚薦菊有亭今作圃掃松無地漫一作子復留墳蝸牛負殼黏碑石老鸛攜雛入隴雲欲把長簫歌楚些却憐度曲不如君兵間有歌舞者邊城未定苦無謀年少金多絶不憂野戰已酣紅帕首塗歌猶醉錦纏頭蛾貪銀燭那知死月戀金尊不照愁亦欲避秦髙隱去桃花源上覓漁舟寄董無益郵鈴帶箭髮紛紛何日山深耳不聞遷客無鄉難避禍飢民失業半充軍馬蹄亂踏湖西雪雁陳平拖塞北雲我亦懶談今世事自看弔古戰場文題小閣一團和氣斫窗黏紙著方牀四面虛明取向陽氊席坐來終日暖皮簾揭動北風涼挂瓶水滿梅花活折鼎湯鳴芋子香布被蒙頭晝眠熟不知門外雪洋洋董靜傳挂冠四聖觀顧本作傅靜挼秋渌洗荷衣問隱孤山隻鶴隨得酒可謀一作禁千日醉挂冠猶恨十年遲雲和家有仙人譜石鼎今無道士詩莫對梅花談世事此花曾見太平時劉悅心入道三茅觀鶡冠髙挂九松巔去結三茅香火緣相國向猶為道士將門今又出神仙坐看紅日生滄島吟寄青衣入洞天跨鶴歸來雲舍近西風井邑只依然同楊心卿過孤山訪靜傳不遇自遊和靖祠下明日奉寄二髙士飛仙又向别峯遊竹下間房且小留滿鬢朔風吹客帽倚闌落日在漁舟梅花路冷難尋冡葑草田荒半作洲獨往獨來沙鳥怪山空木短使人愁酬鄧山房尊師山房間伴白雲棲琴不須彈聽者稀北道主人新拜號西湖顧本作州隱士舊傳衣粵亡未合鴟夷去蜀逺難隨杜宇歸亦欲共君聨石鼎龍頭豕腹怕相譏不應聘髙士束書入谷起徴君盥耳淵棲似不聞知有故人來問字喜無逋客為移文忍貧羞説黃金盡愛老慵將白髮藝獨倚髙樓南北望青天依舊有間雲懷古體要下有寄劉仲鼎四字吹殺青燈炯一作耿不眠滿袊懷古恨綿綿江東曽識桓司馬一作山中空識陶𢎞景滄海一作海上難追魯仲連吳岫一作秦榭月明吟木客漢宫露冷泣銅仙何時一酌桃源酒醉倒春一作東風數百年和范愛竹三首半生豪氣學元龍湖海惟知敬數公徒有貞心招隱逸恨無巨眼識英雄天衢騎馬衣冠異雨屋鳴雞杼軸空西崦東屯何日了定應愁老浣花翁秉燭追遊憶盛一作舊時歡悰終較昔年稀栁多客折涼隂薄薇少人餐雨緑肥胡蝶覺來方識夢海鷗飛去未忘機相逢且可談風月莫話興亡與是非風雨蕭蕭白晝昏肅襟受此一涼恩丘園不作軒裳夢陵谷空遺斧鑿痕乍可扣舷歌楚澤何堪抱瑟立齊門有時散步西原上共醉田家老瓦盆問趙元父病裹飯無因絶往還惟應帖子報平安山公馬向花前放岐伯書從枕上看貿易近來多北藥支持強欲著南冠有時泥醉西園月只欠梅花共倚闌贈金蓀壁黃紙紅旗事已休莫思入谷有鳴騶天開東壁圖書府人立西湖煙雨樓林淺易尋和靖隱菊荒空憶魏公遊客來把玩新題扇半似鍾繇半似歐再答元父騕裊龍媒去未還獨騎欵段客長安青黃誰采溝中斷黑白當從局外看尊俎風流陳日月山林人物古衣冠桂花滿袖王孫逺空倚天風十二闌寄趙春洲莫兩山湖山滿目舊遊空風景荒涼客路窮雨意忽生桐葉外秋光都顧本作多在木稚中乾坤混混多遊騎江漢寥寥有斷鴻自古隱人多嗜酒却憐無酒醉新豐和兩山二首世事枰棊入角危有人袖手只攢眉路通巴蜀那須檄馬立澶淵更要詩公竟醉耶從汝笑樹猶如此信吾衰傳間雙珥消兵氣猶把葵心向鬱儀窮鄉何處覓新豐身世悠悠醉夢中未學伏波尸馬革且隨甫里問龜蒙簷一作擔頭喜有桑榆日兵後那無草木風亦欲飛神遊八極扁舟坦卧不須篷讀陳去非集簡齋吟集一作册是吾師句法能參杜拾遺宇宙無人同叫嘯公卿自古嘆流離窮途劫劫誰憐汝遺恨茫茫不在詩莫道墨梅曾遇主黃花一絶更堪悲近世習唐詩者以不用事為第一格少陵無一字無來處衆人固不識也若不用事云者正以文不讀書之過耳暇日與里人盛元仁言之余與元仁俱以筆墨受兩山先生知余之心元仁之心先生之心同矣元仁歸十錦將束書渡淮輒録小卷贈行以寄君思若元仁小好詩録以教我以寄豫思明月天涯千里對面稽不孤矣戊寅七夕前三日武林仇逺頓首頓首勾龍爽毛女曾是阿房學舞人玉簫舊譜尚隨身喜歸商嶺尋仙藥忍見秦宫化劫塵松蜜春腴差可飽檞衣秋碎不須紉憑誰喚起勾龍爽更寫湘妃與洛神梅花為怕緇塵染一作著素衣凍痕封蕊放春遲月來忽送闌干影春到不分南北枝啼夢翠禽依樹宿斷魂玉笛隔花吹任顧本作從他萬片隨風去須有青青葉底時夢想幽芳無處尋相逢依舊嵗寒心要看葉底玲瓏玉休折枝頭蓓藟金清曉風霜和艷冷黃昏庭院覺香深揚州一樹春多少殢得何郎瘦不禁潮顧本作錢塘觀潮一痕初見海門生頃刻長驅作怒聲萬馬突圍天鼓碎六鼇覆一作翻背雪山傾逺朝魏闕心猶在直上一作到嚴灘勢始平寄語吳兒休踏浪天吳罔象正縱橫湖上嵐霧濛濛曉未收青紅窗户失飛樓雨添芳草侵官道水漲浮萍入御舟蘇小只傳身後曲江淹曽賦别時愁杏花風急清明近已覺新寒似麥秋春日田園雜興一灣新緑護茅廬草細泥鬆已可鉏野老但知分社酒地官寧復進農書鶯花眼界人煙外蠶麥生涯榖雨餘我愛賦歸陶令尹栁邊時見小藍輿月泉吟社評曰社酒農書一聨厥有深意不但全篇清婉而已次胡葦杭韻一作和希聖湖上韻顧本作和韻胡希聖湖上連作湖山五日遊沙鷗慣識木蘭舟清風顧本作明寒日荒城晚燕子梨花細雨愁賜火恩榮皆舊夢禁煙風景似初秋鳳絲龍竹繁華意猶為西林落日留秋日西湖園亭西湖一曲百泉通漠漠青山繞梵宫故國園林秋色淨明朝風雨桂花空銀笙玉笛清歌外畫舫珠簾落照中人物風光兩相稱兒童遮莫笑山翁飲陸靜復山房分韻得時字連轡行春自作期尋芳却笑我來遲三杯雲液花前酌一曲瓊簫竹下吹滄海桑田非舊日石泉槐火有新詩山中道士間於鶴門外紅塵總不知石屋洞顧本作遊石屋洞誰擘空青露石坳遊龍伸臂下南髙鬼神穿鑿地脈碎風雨支撑天柱牢峭壁蒼苔侵佛髻懸崖滴乳濕僧袍伽藍聞是香山叟燈暗荒池顧本作祠荒沒野蒿蛇山一作遊花家山一作遊麥嶺間尋顧本作循石澗列雲扉樹影生涼怯苧衣靜碧軒窗聊寄傲軟紅塵土竟忘歸滿傾竹葉春霞滑輕折蕉花曉露晞禪意法乘俱莫問且談舊事更顧本作共依依湖上值雨波痕新緑草新青有約尋芳芳不晴莎徑泥深雙燕濕栁橋煙淡一鶯鳴山圍故苑春常鎖泉落低畦暖未耕十載舊蹤時入夢畫船多處看傾城同段吉甫泛湖西湖春碧淨無泥畫舫朱簾傍岸移寒食清明初過後杏花楊栁乍晴時從教西日催歌鼓莫放東風轉酒旗只恐明朝成雨去暗驚濃緑上髙枝同陳彥國泛湖斜堤髙栁緑連天且繫間人書畫船花事已空三月後湖光還似十年前洛陽園囿惟詩在江左英雄托酒傳亦欲扣舷歌小海恐驚沙上白鷗眠陪戴祖禹泛湖分韻得天字冉冉夕陽紅隔雨悠悠野水碧連天山分秋色歸紅葉風約蘋香入釣顧本作盡船鐘鼓園林已如此衣冠文物故依然當歌對酒腸堪斷倒著烏巾且醉眠鳳凰山故宫一作錢塘懷古漸無南渡舊衣冠尚有西湖風雨寒鳳鳥不來山寂寂鴟夷何在海漫漫荒陵樵採官猶禁故苑煙花客自看惟恨餘杭門外栁長年不了送征鞍集慶寺顧本作宿集慶寺平一作半生三宿此招提眼底交遊更有誰顧愷漫留金粟影杜陵忍賦玊華詩旋烹紫筍猶含籜自摘青茶未展旗聽徹洞簫清不寐月明正照古松枝卜居白龜池上一琴一鶴小生涯陋巷深居幾嵗華為愛西湖來卜隱郤憐東野又移家荒城雨滑難騎馬小市天明已賣花阿母抱孫間指點疏林盡處是棲霞過李山人居數椽竹屋傍秋江屋外疏籬隔栁樁客至旋分垂釣石雨來自掩讀書窗癡兒弄鏡時翻背小婦彈筝不識腔自古漁樵有遺逸未應只説鹿門龎題趙子固水墨雙鈎水仙卷冰薄沙昏短草枯采香人逺隔湘湖誰留夜月羣仙珮絶勝秋風九畹圖白粲銅盤傾沆瀣清明寶玦破珊瑚却憐不得同蘭蕙一識清醒楚大夫書與士瞻上人十首我本迂疏落拓人滿頭霜雪滿懷春登山有屐身恆健挂壁無弦趣更真往嵗效官殊漫浪老來學佛離貪嗔却憐衛鶴齊雞輩空費心機不庇身野鶴清髙六翮輕孤雲萬里去冥冥漢科合應茂才選顧本作舉唐士曽書遺教經好趁江南諸老在盡看薊北衆山青錦衣歸日春風滿期醉沙堤雙玊瓶懶學羊裘漢子陵亦非解印晉淵明好山好水恆相對浮利浮名不願爭詩酒每尋朋友共山園都付子孫耕野心直與間雲似卻笑孤雲出岫輕末俗由來不貴儒愚夫愚婦顧本作小夫小婦恣揶揄束書合向山林隱絶迹莫登名利途膝下顧作上有孫貧亦樂門前無債醉如泥咸平處士真㙋羡靜顧作死守梅花住裏湖宦海漂流四十年老來默默守吾玄艱危頗得文章力嫁娶各隨兒女緣白飯充腸聊當肉好書到手不論錢間心懶作邯鄲夢樂取西顧作南窗一枕眠筆硯顧作墨生涯獨善身一區花竹四時春無求莫問朝廷事有恥難交市井人廉外烏衣飛上下窗前蜂顧作絳蕊結輪囷鑑如居士東鄰住肯借霜豪為寫真難得心交左伯桃亦無善相九方臯而今賤子多儒誤自古山人索價髙衆雀豈能知鵠志一雞何足用牛刀獨醒獨醉俱堪樂妙理依然有濁醪倦遊懶著小烏巾短髮絲絲雪滿簮信手拈書聊慰眼轉頭忘事太無心笑他杜老頻看鏡愛我昭文不鼓琴喜有山林方外友時攜佳紙索新吟北風雨後忽南風頃刻開晴又轉東后土未乾偏有恨漏天難補太顧作已無功小樓兀坐思猿鶴好客相期避燕鴻壁顧作筆上墨蘭香可掬令人常憶所南翁豪氣年來漸掃除簞瓢自樂守臞儒江頭盡醉唐朝士澤畔行吟楚大夫萬里鵾鵬何必羡一官蟣蝨不如無葛巾草履從人笑莫問青衫似顧作山落葉枯士瞻上人習靜好修與豫晦翁笑隱長老三世交矣求豫斐章遂信手寫七言十首塞白上人其為我佛前懺悔綺語業至治元年九日山村老友仇逺書於北橋躬行齋題溧陽市萬家大縣舊留都一派中江入太湖縮項魚肥人鱠玊長腰米貴客量珠府分南北寒蕪合橋直東西夜市無却是旗亭浮蟻美杖頭能費幾青蚨魯庵尊師以彞齋白描四薌命作韻語淡墨英英妙寫真一花一葉一精神繁香曽入廬山夢遺珮如行湘水春小白凝珠還勝雪輕黃承襪不生塵老僧懶作浮華想空谷猶疑見似人題李公略示髙郎中吳山觀月圖憑髙宜晚更宜秋下馬歸來即倚樓納納乾坤雙老眼滔滔江漢一扁舟滿城明月空吳苑隔岸青山認越州李白酒豪髙適筆當時人物總風流檇李亭間抱琴書檇李遊仙壇古屋一茆一作笻留驛橋通市人沽酒湖水依城客放舟葵扇桃笙聊却暑蘋花楓葉已知秋坡翁仙去詩聲在寂寞林塘卧白鷗真如寺一橋夭矯界雙湖野徑沿流到佛廬石塔殘燈猶閃爍相家喬木已蕭疏苔封古井晴逾滑骨冷荒山草不除長水法師癡闕甚闕根人定欲何如劉伶墓鳳浦鴛湖西有墳此塋寂寞海邊村落花紅雨鬼仙句淡月黃昏酒聖魂有鍤已隨棺槨化無碑空信艾芻言螟蛉蜾羸今何在起為先生酹一尊送峿侍者遊茅山雲開三茅古洞天借風一棹一作柁荆溪船所思綿綿常在夢此行冉冉如登仙汲泉淨洗黃􅍦雪劚石深耕瑶草煙蕙帳香凝蒲坐暖共讀顧作續南華秋水篇集虛書院築室東臯野水濱室中生白坐生春了知空洞元無物須信清明自有神幽徑草花聊適趣間窗筆硯不留塵酒經丹訣非吾事萬卷書藏一老身遊天竺二首行遍山巔又水涯尚無紅葉與黃花長松夾道六七里小墅通村十數家竺國雲深僧寂寞草堂洞古石嵯牙野翁共醉官壚酒扶醉歸來已暮鴉登覽欣逢勝日間蒼松九里費躋攀行過緑水盡頭路步入白雲生處山猿鳥尚能知異境仙凡原不隔重關幾時拂袖逃塵網野衲村樵共往還遊智果寺獨徑蒼苔引瘦笻牆隂修竹碧玲瓏青山猶見及坡老小雨何須問社公雲冷石藏烹茗雪日長門掩落花風定知神扈題梁字不與當時劫火同晦日攜幼湖上葛嶺蘇堤畫寂然東風吹我過湖船江山信美無人會兒女情多只自憐栁色染勻春淡蕩楊花落盡日暄妍麥秋天氣渾如此卻笑征衫未脫綿丹心丹心只有杜陵知愁讀傷春五首詩傳語一作與龜年休度曲江南正是落花時登寶林應天塔越王城下草青青眺逺須登第幾層白髮山僧間指點斜陽古木是諸陵朝天門城角颯颯秋風起白榆山前吹徹小單于行人便作邊城聽忘却杭州是故都斷橋聞角栁外官橋出戍樓和霜和月按梁州吹時莫近孤山下千樹梅花不識愁懷向古曽同野竈煮溪魚别鶴歸遲信息疏不是山中無楮葉尋常懶寄入城書博望使者星明犯斗牛歸槎穩放絳河秋茂陵可是無仙分不載丹砂載石榴上已感懷一春無況懶遊山風景依然三月三十里楊花深似雪馬蹄無路入江南范文正公黃素小楷昌黎伯夷頌蓋在青社時所書以遺京西轉運使舜元蘇公者也後二百年大興李侯戡得此本於燕及南來守吳乃文正鄉里即訪公子孫以畀之范氏喜而求詩為賦此二首小楷青州三絶碑伯夷之清昌黎之文文正之書故稱三絶復還范氏事尤竒不知百世聞風者更有何人似伯夷古今一理是綱常范筆韓文妙發揚公卧首陽原不死春風嵗嵗蕨薇香題李成寒鴉圖老樹枯苔雪乍晴飢烏飛集噤無聲蒺藜沙上花開早且讓春風與燕鶯題燕肅畫卷溪路迢迢繞碧峯白雲迷卻舊行蹤買舟歸去山中住終日茆亭坐聽松題趙松雲迷禽竹石圖錦石傾敧玉樹荒雪兒無語戀斜陽百年花鳥春風夢不是錢塘是汴梁題和靖先生觀梅圖無懷上人徴豫作癡童癯鶴冷相隨笑指南枝傍小溪到處一般香影色孤山只在斷橋西雲屋上人久别承寄以詩次韻謝顧本寄以詩下作甚慰仰思謹次韻以謝且堅雅操月落城空鶴倦飛密雲深樹靜相依閶門北去山如畫有日同師步翠微趙子昂陳仲美合作水鳬小景良工苦思可心降底事文禽不解雙欲采芳華波浪闊芙蓉朵朵隔秋江題三忠堂三首趙葵宅也丞相當年握筆時封胡羯末總佳兒後來家有無窮事便是天仙也不知謝砌諸郎入寄奴機雲忘祖亦忘吳一門一品如今有三世三忠自古無一紙郇雲傲劫灰慈親一見一心摧如今王謝堂前燕飛入人家更不回題趙仲穆山水二首緑林紅樹石崢嶸有客攜琴訪友生今夜西軒風月好殷勤為我鼓商聲王孫遺迹在桐鄉留意當年翰墨香回首西風多感慨不辭援筆賦嵇康題趙松雲竹石幽蘭舊時長見揮毫處修竹幽蘭取次分欲把一竿苕水上漚波千頃看秋雲岊山岊老峯髙翠倚天洮河春水緑無邊不知楊栁蒹葭外何處泊君書畫船間居十詠階前紫蔓金絲草籬角紅垂錦帶花梓澤平泉易消歇春留富貴與詩家樹隔殘鐘逺欲無野雲漠漢雨疏疏飛蚊盡逐南風去父子燈前共讀書仰屋著書無筆力閉門覓句費心機不如花下冥冥坐靜看蜻蜓蛺蝶飛鶯花韋曲舊時遊老去間情已五休却笑東風無檢東又隨飛絮過南樓鳥雀喧秋未肯棲狂風吹樹影離披屋邊尚有斜陽在更看山人一局棋風挾濃雲起炮車捎窗兩腳亂如麻山中茆屋應安穩不向溪聲送落花新竹修修緑過顧作覆牆讀書門外亦隂涼道人清福不肯受却入西山看夕陽翠袖佳人倚莫寒雙禽踏破玊闌干空山月落春風換直作羅浮夢裏看茶甌沙帽慣迎賓不是詩人即道人細雨斜風君莫出緑隂門外有紅塵珠簾玉柵綺羅叢猶有承平京洛風飲罷歸來遊騎少一庭明月夜方中題馬秀卿郊墅仙人朝去莫知還野色風一作嵐光一草庵少室何妨髙索價莫教輕指作終南題天夀觀清隱山房紫極秋聲竹滿軒一塵飛不涴琴樽白雲自逐秋風去卧看青山懶出門泊桐鄉雪晴霜樹勝春紅回首臨平杳靄中正是詩人棲穩處青山明月滿歸篷宿本覺寺竹樹號風似説禪青燈布被抱愁眠東坡三過我一宿盡是人生清淨緣李待詔虎溪三笑圖偶然行過溪橋正自不值一笑三人必有我師不笑不足為道遺句久欲脫塵網未有辟榖方釋然山中遊世慮可暫忘中缺鷗鷺亦知幾深入菰蒲藏卧舟放中流吾不如漁郎南山逢顧君際髙荷不受雨傾㵼與低荷低荷強自持聚雨傾入波朝雨尚滴瀝晚雨忽滂沱臨池卧以聽雨聲靜中多兩耳本自清奈此荷葉何螢火惟知夜燈花不待春割蒲分坐具貯瀑入軍持風雨不出户兒孫共讀書以上見方萬里桐江集姓名不入六臣傳容貌堪傳九老碑老尚留樊素貧休比范丹以上見癸辛雜識詞玊蝴蝶缺生查子叉頭綴玊蟲耿耿東窗曉京洛少年遊猶恨歸來早寒食正梨花古道多芳草今夜試青燈依舊雙花小八犯玊交枝招寶山觀月上滄島雲連緑瀛秋入暮景却沈洲嶼詞綜作渚無浪無風天地白聽得潮生人語擎空孤柱翠倚高閣憑虛中流蒼碧迷煙霧惟見廣寒門外青無重數不知是水不知是山是樹一作不知是水是山不知是樹漫漫知是何處倩誰問凌波輕步漫凝佇詞綜作睇乘鸞秦女想庭曲霓裳正舞莫須長笛吹愁去怕喚起魚龍三更噴作前山雨齊天樂賦蟬夕陽門巷荒城曲清音早鳴秋樹薄翦綃衣涼生鬢影獨飲天邊風露朝朝暮暮奈一度淒吟一番淒楚尚有殘聲驀然飛過别枝去齊宫往事漫省行人猶説與當時齊女雨歇空山月籠古栁倣佛舊曽聽處離情正苦甚懶拂冰箋倦拈琴譜滿地霜紅淺莎尋蛻羽瑶華慢雪疏疏密密漠漠紛紛乍舞風無力殘磚斷礎轉眼化作方圭圓璧非花非絮似逞巧先投窗隙立小樓不見青山萬里鳥飛無迹休憐凍梗冰苔但飛入平林都是春色年華晼晚誰信道老却梁園詞客踏青近也且二白何須三白把一白分與梅花要點夀陽宫額序馬霞外詩集序錢塘有隱君子曰馬虛中其資也粹其學也正其言也文其居家篤于孝弟清勤恬雅動以古人自飭暨出家著道士服隱約西湖之濱士大夫慕與之交不過習清虛談淡泊無一言及勢力聲利而世之能寒熱人者爾爾我我進退語默之間一言不少屈蓋內重而簡外信已而不求人知而人之知者誠心説服焉噫君子哉豫與虛中遊有年平昔已敬其人一日虛中攜詩卷相示大扺以平夷恬淡為體清新圓美為用陶衷于空合道于趣渾然天成不止于煙雲花草魚鳥而已鄉有雪巘禇先生者博學卓行之士也執古刀尺裁量晚後虛中從之學盡得其微妙況汗漫萬里逺覽嵩岱之雄拔江河濟淮之奔放近挹兩峯三潭六橋之佳麗秀整交廣視闊胸次宏豁宜其筆力不凡如此昔人謂不行千里不可讀杜詩而蘷州以後殊更老成豫于虛中之歸不但放一頭且畏之矣西湖物物是詩料秋來日日是詩思尚當與子吟嘯於乾坤萬象之表大德六年九日里人仇逺序跋題江道貫百牛圖山中人有以百牛圖相示余謂宣王考牧于阿于池九十其犉已詫其牛之多況濕濕之耳滿二百耶田舍翁每以多牛為富安得一黃犢歸耕南山下余所愛一牛耳掩卷一粲跋趙榮祿小楷過秦論余十數年前遊白石披雲庵南谷杜先生出示子昂所書黃素黃庭經楷法端徑今復見過秦論于民瞻字畫比黃素尤縝密實為二妙邇來子昂小楷與前微不同年事筆力日進日益真余之畏友也大德辛丑長至日南陽仇逺書題趙子昂書余見子昂臨臨河序何翅數百本無一字不咄咄逼真如郢人運斤成風庖丁奏刀批卻導窽因其固然如輪扁老于劉如大馬捶鈎不失毫芒得之心應之手在夫熟之而己此本經師道子俊鑒定增價十倍錢塘仇逺山村遺集
